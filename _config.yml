# Site settings
title: Lizi's homepage # site title
description: >- # site description
  Hi! This is Lizi, currently living in Copenhagen, orginally from China. Just got the 
  master's degree in University of Copenhagen, and now trying to exploring all possibilities
  of my own life.
lang: en-US # default lang
timezone: Europe/Copenhagen # set your timezone
image: assets/img/ogp.png # This image used for Open Graph more info https://ogp.me/
repo: https://github.com/LiZi-77/LiZi-77.github.io # site repo [optional]
mode: light # default theme "dark" | "light"

# Profile settings
author:
  name: Lizi # author name
  bio: >- # tell to the world
    Hi! This is Lizi 🧚🏻‍♀️, currently living in Copenhagen, orginally from China. Just got the 
    master's degree of Computer Science 👩🏻‍🎓 in University of Copenhagen, and now trying to exploring all possibilities
    of my life ✨.
  username: Lizi # general username
  github: LiZi-77 # github username
  twitter: twitter_username # twitter username
  facebook: facebook_username # facebook username
  email: lizli.7797@gmail.com # email adress
  avatar: /assets/img/monv1.png # change with your own avatar

# URL settings
url: "https://klise.now.sh" #
baseurl:
permalink: /:title/
google_analytics: # leave it blank if not wish
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Homepage limit posts
number_of_posts: 5

# Build settings
# theme: klise
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - lighthouse.png
  - klise-*.gem
  - klise.gemspec

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-postfiles
